version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hireai_postgres
    environment:
      POSTGRES_USER: hireai_user
      POSTGRES_PASSWORD: hireai_pass
      POSTGRES_DB: hireai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireai_user"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hireai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: